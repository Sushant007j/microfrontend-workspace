<section class="home">
  <h1>Enterprise Micro Frontend Shell</h1>
  <p>Manage your workspace, theme, and language from a single shared state.</p>
  <div class="controls">
    <button type="button" (click)="setTheme('light')">Light</button>
    <button type="button" (click)="setTheme('dark')">Dark</button>
    <button type="button" (click)="setLanguage('en')">English</button>
    <button type="button" (click)="setLanguage('fr')">Français</button>
    <button type="button" (click)="setLanguage('de')">Deutsch</button>
  </div>
  <div class="cards">
    <div class="card">
      <h3>Current user</h3>
      <p>{{ appState.currentUser()?.name ?? 'Not signed in' }}</p>
    </div>
    <div class="card">
      <h3>Theme</h3>
      <p>{{ appState.theme() }}</p>
    </div>
    <div class="card">
      <h3>Notifications</h3>
      <p>{{ appState.notificationCount() }}</p>
    </div>
  </div>
</section>
