<aside class="sidebar" role="navigation" aria-label="Workspace navigation">
  <div class="sidebar-inner">
    <div class="brand">Workspace</div>

    <nav class="nav">
      <a routerLink="/dashboard" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">Dashboard</a>
      <a routerLink="/products" routerLinkActive="active">Products</a>
      <a routerLink="/users" routerLinkActive="active">Users</a>
    </nav>

    <div class="meta">
      <p><strong>Theme:</strong> {{ appState.theme() }}</p>
      <p><strong>Language:</strong> {{ appState.language() }}</p>
      <p><strong>Notifications:</strong> {{ appState.notificationCount() }}</p>
    </div>
  </div>
</aside>
