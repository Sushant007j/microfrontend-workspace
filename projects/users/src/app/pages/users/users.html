<section class="users">
  <h2>Users</h2>
  <div class="cards">
    <div class="card">
      <h3>Logged User</h3>
      <p>{{ appState.currentUser()?.name ?? 'Guest' }}</p>
    </div>
    <div class="card">
      <h3>Selected Product</h3>
      <p>{{ appState.selectedProduct()?.name ?? 'None' }}</p>
    </div>
    <div class="card">
      <h3>Notifications</h3>
      <p>{{ appState.notificationCount() }}</p>
    </div>
    <div class="card">
      <h3>Theme</h3>
      <p>{{ appState.theme() }}</p>
    </div>
    <div class="card">
      <h3>Language</h3>
      <p>{{ appState.language() }}</p>
    </div>
  </div>
</section>
